<!DOCTYPE html>
<html>
<head>
  <title>Titan TRT Chat</title>
  <style>
    body { font-family: Arial; margin: 0; background: #1a1a1a; }
    #chat-bubble { position: fixed; bottom: 20px; right: 20px; z-index: 9999; }
    #chat-toggle { background: #c8a84b; color: white; border: none; 
      border-radius: 50px; padding: 15px 25px; font-size: 16px; 
      cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
    #chat-box { display: none; width: 320px; background: white; 
      border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); 
      overflow: hidden; margin-bottom: 10px; }
    #chat-header { background: #c8a84b; color: white; padding: 15px; 
      font-weight: bold; }
    #messages { height: 300px; overflow-y: auto; padding: 15px; }
    .bot-msg { background: #f0f0f0; padding: 10px; border-radius: 10px; 
      margin: 5px 0; }
    .user-msg { background: #c8a84b; color: white; padding: 10px; 
      border-radius: 10px; margin: 5px 0; text-align: right; }
    #input-area { display: flex; padding: 10px; border-top: 1px solid #eee; }
    #user-input { flex: 1; padding: 8px; border: 1px solid #ddd; 
      border-radius: 8px; margin-right: 8px; }
    #send-btn { background: #c8a84b; color: white; border: none; 
      padding: 8px 15px; border-radius: 8px; cursor: pointer; }
  </style>
</head>
<body>
<div id="chat-bubble">
  <div id="chat-box">
    <div id="chat-header">💪 Titan TRT Assistant</div>
    <div id="messages">
      <div class="bot-msg">Hi! I'm your Titan TRT assistant. 
      How can I help you today?</div>
    </div>
    <div id="input-area">
      <input id="user-input" type="text" placeholder="Ask me anything..."/>
      <button id="send-btn">Send</button>
    </div>
  </div>
  <button id="chat-toggle" onclick="toggleChat()">💬 Chat With Us</button>
</div>
<script>
  function toggleChat() {
    const box = document.getElementById('chat-box');
    box.style.display = box.style.display === 'block' ? 'none' : 'block';
  }
  document.getElementById('send-btn').onclick = sendMessage;
  document.getElementById('user-input').addEventListener('keypress', function(e) {
    if(e.key === 'Enter') sendMessage();
  });
  async function sendMessage() {
    const input = document.getElementById('user-input');
    const messages = document.getElementById('messages');
    const text = input.value.trim();
    if (!text) return;
    messages.innerHTML += `<div class="user-msg">${text}</div>`;
    input.value = '';
    messages.innerHTML += `<div class="bot-msg" id="typing">Typing...</div>`;
    const res = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text })
    });
    const data = await res.json();
    document.getElementById('typing').remove();
    messages.innerHTML += `<div class="bot-msg">${data.reply}</div>`;
    messages.scrollTop = messages.scrollHeight;
  }
</script>
</body>
</html>
